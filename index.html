<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starleling Bank Demo</title>

<style>
body{
background:#050b18;
font-family:Arial;
color:white;
padding:20px;
}

.card{
background:#101b35;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0d6efd;
color:white;
font-size:18px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

.user-box{
background:#18284d;
padding:15px;
border-radius:15px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Starleling Bank</h1>

<div class="card">
<h2>Maria Rodriguez</h2>
<h3 id="mainBalance">Balance: $3,000,000</h3>
</div>

<div class="card">
<h2>Create Demo Account</h2>
<input type="text" id="newUser" placeholder="Enter account name">
<button onclick="createAccount()">Create Account</button>
</div>

<div class="card">
<h2>Transfer Demo Money</h2>
<input type="text" id="receiver" placeholder="Receiver account name">
<input type="number" id="amount" placeholder="Amount">
<button onclick="transferMoney()">Send Demo Transfer</button>
</div>

<div class="card">
<h2>Demo Accounts</h2>
<div id="accounts"></div>
</div>

<div class="card">
<h2>Transfer History</h2>
<div id="history"></div>
</div>

<script>
let mainBalance = 3000000;

let accounts = [];

function updateBalance(){
 document.getElementById("mainBalance").innerHTML =
 "Balance: $" + mainBalance.toLocaleString();
}

function createAccount(){
 let name = document.getElementById("newUser").value;

 if(name === ""){
  alert("Enter account name");
  return;
 }

 accounts.push({
  name:name,
  balance:0
 });

 renderAccounts();

 document.getElementById("newUser").value = "";

 alert("Demo account created successfully");
}

function renderAccounts(){
 let area = document.getElementById("accounts");
 area.innerHTML = "";

 accounts.forEach(acc => {
  area.innerHTML += `
   <div class="user-box">
    <h3>${acc.name}</h3>
    <p>Balance: $${acc.balance.toLocaleString()}</p>
   </div>
  `;
 });
}

function transferMoney(){
 let receiver = document.getElementById("receiver").value;
 let amount = Number(document.getElementById("amount").value);

 let user = accounts.find(acc => acc.name === receiver);

 if(!user){
  alert("Account not found");
  return;
 }

 if(amount <= 0){
  alert("Enter valid amount");
  return;
 }

 if(amount > mainBalance){
  alert("Insufficient demo balance");
  return;
 }

 mainBalance -= amount;
 user.balance += amount;

 updateBalance();
 renderAccounts();

 let history = document.getElementById("history");
 history.innerHTML += `
 <div class="user-box">
 Sent $${amount.toLocaleString()} to ${receiver}
 </div>
 `;

 document.getElementById("receiver").value = "";
 document.getElementById("amount").value = "";

 alert("Demo transfer completed successfully");
}
</script>

</body>
</html>
