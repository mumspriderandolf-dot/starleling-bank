<!DOCTYPE html>
<html>
<head>
  <title>Starleling Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:black;
      color:white;
    }

    .header{
      background:#0d1b2a;
      padding:20px;
      text-align:center;
    }

    .card{
      background:#1b263b;
      margin:20px;
      padding:20px;
      border-radius:20px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#0077ff;
      color:white;
      margin-top:10px;
      font-size:16px;
    }

    h1,h2,h3{
      margin:0 0 10px 0;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Starleling Bank</h1>
  <p>Banking Without Limits</p>
</div>

<div class="card">
  <h2>Maria Rodriguez</h2>
  <p>Current Account</p>
  <h1>$3,000,000</h1>
</div>

<div class="card">
  <h3>Visa Card</h3>
  <p>4532 8890 1123 4821</p>
  <p>Expiry: 12/30</p>
</div>

<div class="card">
  <h3>Quick Actions</h3>

  <button>Send Money</button>
  <button>Check Balance</button>
  <button>Crypto Wallet</button>
  <button>Loan Request</button>
  <button>Freeze Card</button>
</div>

<div class="card">
  <h3>Admin Dashboard</h3>
  <p>Admin: Patrick Jackson</p>
</div>

</body>
</html>
